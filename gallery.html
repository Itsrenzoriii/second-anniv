<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>
    <link rel="stylesheet" href="gallery.css">
</head>
<body>
    <div class="back-wrapper">
        <button class="back-btn" onclick="window.location.href='present.html'">Back</button>
    </div>
<div class="container">
        <h1 class="gallery-title">Our Pictures</h1>
        <div class="gallery-grid" id="gallery-grid">
            <!-- Images will be loaded by JavaScript -->
        </div>
    </div>
    <div class="lightbox" id="lightbox">
        <span class="lightbox-close" id="lightbox-close">&times;</span>
        <img class="lightbox-image" id="lightbox-image" src="" alt="">
        <span class="lightbox-prev" id="lightbox-prev">&#10094;</span>
        <span class="lightbox-next" id="lightbox-next">&#10095;</span>
    </div>
    <script src="gallery.js"></script>
</body>
</html>
